name: Deploy to Render

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Backend build and test
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Lint backend (optional)
        working-directory: ./backend
        run: npm run lint --if-present
      
      # Frontend build
      - name: Build frontend
        working-directory: ./frontend
        run: npm ci
      
      - name: Run frontend tests (optional)
        working-directory: ./frontend
        run: npm test --if-present

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy backend to Render
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK}}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          curl "$RENDER_DEPLOY_HOOK"
          echo "Backend deployment triggered"
      
      - name: Deploy frontend to Render
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          curl "$RENDER_DEPLOY_HOOK"
          echo "Frontend deployment triggered"
      
      - name: Wait for deployments
        run: sleep 30

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
